{% extends "base.html" %}
{% block title %}Editar Usuario - Admin{% endblock %}

{% block content %}
<div class="max-w-xl mx-auto">
    <div class="bg-panel rounded-3xl border border-slate-800 p-8 shadow-2xl">
        <h1 class="text-xl font-bold text-white uppercase tracking-tight mb-6">Editar Usuario: <span class="text-accent">{{ u.username }}</span></h1>

        <form method="POST" class="space-y-6">
            <div class="space-y-1">
                <label class="text-[10px] text-slate-500 font-bold uppercase ml-1">Nombre de Usuario</label>
                <input type="text" name="username" value="{{ u.username }}" required class="w-full bg-slate-900 border border-slate-700 rounded-2xl px-4 py-3 text-white focus:ring-2 focus:ring-accent outline-none transition-all">
            </div>

            <div class="space-y-1">
                <label class="text-[10px] text-slate-500 font-bold uppercase ml-1">Rol de Acceso</label>
                <select name="rol" class="w-full bg-slate-900 border border-slate-700 rounded-2xl px-4 py-3 text-white outline-none">
                    <option value="solo_lectura" {% if u.rol == 'solo_lectura' %}selected{% endif %}>Solo Lectura</option>
                    <option value="cobrador" {% if u.rol == 'cobrador' %}selected{% endif %}>Cobrador</option>
                    <option value="admin" {% if u.rol == 'admin' %}selected{% endif %}>Administrador</option>
                </select>
            </div>

            <div class="flex gap-3 pt-4">
                <a href="{{ url_for('admin_usuarios') }}" class="flex-1 text-center py-4 rounded-2xl border border-slate-700 text-slate-400 font-bold text-sm hover:bg-slate-800 transition-all">Cancelar</a>
                <button type="submit" class="flex-[2] py-4 rounded-2xl bg-accent text-slate-900 font-bold text-sm shadow-lg shadow-cyan-900/20 active:scale-95 transition-all">Guardar Cambios</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
