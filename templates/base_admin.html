<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#0F172A">
  <title>{% block title %}Panel Administrativo - Financiera NP{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { background-color: #0F172A; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #111827; }
    ::-webkit-scrollbar-thumb { background: #1F2937; border-radius: 10px; }
    ::-webkit-scrollbar-thumb:hover { background: #374151; }
  </style>
</head>
<body class="text-gray-200 min-h-screen">

  <!-- Header Admin Desktop/Móvil Superior -->
  <header class="bg-slate-900 border-b border-slate-800 px-4 py-4 sticky top-0 z-50 shadow-xl">
    <div class="max-w-5xl mx-auto flex justify-between items-center">
      <div class="flex items-center gap-3">
        <div class="w-10 h-10 rounded-xl bg-cyan-500/20 flex items-center justify-center border border-cyan-500/30">
            <span class="text-xl">🛡️</span>
        </div>
        <div class="hidden sm:block">
            <h1 class="text-sm font-black tracking-tighter text-white">ADMIN <span class="text-cyan-400">PANEL</span></h1>
            <p class="text-[9px] text-slate-500 font-bold uppercase tracking-widest">Gestión de Sistema</p>
        </div>
      </div>

      <nav class="flex gap-4 sm:gap-8 text-[10px] sm:text-[11px] font-bold uppercase tracking-widest">
        <a href="{{ url_for('admin_dashboard') }}" class="transition-colors {% if request.endpoint == 'admin_dashboard' %}text-cyan-400{% else %}text-slate-500 hover:text-slate-300{% endif %}">Métricas</a>
        <a href="{{ url_for('admin_usuarios_list') }}" class="transition-colors {% if request.endpoint == 'admin_usuarios_list' %}text-cyan-400{% else %}text-slate-500 hover:text-slate-300{% endif %}">Monitoreo</a>
        <a href="{{ url_for('admin_usuarios') }}" class="transition-colors {% if request.endpoint == 'admin_usuarios' %}text-cyan-400{% else %}text-slate-500 hover:text-slate-300{% endif %}">Usuarios</a>
      </nav>

      <div class="flex items-center gap-2">
          <a href="{{ url_for('index') }}" class="text-[10px] font-bold uppercase bg-slate-800 px-4 py-2 rounded-xl text-slate-400 hover:bg-slate-700 hover:text-white transition-all active:scale-95">Salir</a>
      </div>
    </div>
  </header>

  <main class="max-w-5xl mx-auto px-4 py-8 pb-20">
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        <div class="fixed top-20 left-4 right-4 z-50 pointer-events-none">
            {% for cat, msg in messages %}
              <div class="max-w-md mx-auto mb-2 p-4 rounded-2xl shadow-2xl backdrop-blur-md {% if cat == 'ok' %}bg-emerald-900/80 text-emerald-100 border border-emerald-500/30{% else %}bg-rose-900/80 text-rose-100 border border-rose-500/30{% endif %} text-xs font-bold pointer-events-auto">
                {{ msg }}
              </div>
            {% endfor %}
        </div>
      {% endif %}
    {% endwith %}

    <div class="animate-in fade-in duration-500">
        {% block content %}{% endblock %}
    </div>
  </main>

</body>
</html>
