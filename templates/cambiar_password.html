{% extends "base.html" %}
{% block title %}Actualizar Contraseña - Financiera NP{% endblock %}
{% block content %}
<div class="max-w-md mx-auto mt-10">
    <div class="bg-panel rounded-3xl border border-red-500/30 p-8 shadow-2xl">
        <div class="text-center mb-8">
            <span class="text-4xl">🔐</span>
            <h1 class="text-2xl font-bold mt-4 text-white">Seguridad de la Cuenta</h1>
            <p class="text-sm text-slate-400 mt-2">Debes cambiar tu contraseña inicial antes de continuar usando el sistema.</p>
        </div>

        <form method="POST" class="space-y-5" data-loading-submit data-loading-label="Guardando…">
            <div>
                <label class="text-[10px] text-slate-500 font-bold uppercase ml-1">Nueva Contraseña (mín. 8 caracteres)</label>
                <input type="password" name="p1" required autofocus minlength="8"
                       class="w-full mt-1 bg-slate-900 border border-slate-700 rounded-2xl px-4 py-3 text-white focus:ring-2 focus:ring-red-500 outline-none transition-all">
            </div>

            <div>
                <label class="text-[10px] text-slate-500 font-bold uppercase ml-1">Confirmar Nueva Contraseña</label>
                <input type="password" name="p2" required minlength="8"
                       class="w-full mt-1 bg-slate-900 border border-slate-700 rounded-2xl px-4 py-3 text-white focus:ring-2 focus:ring-red-500 outline-none transition-all">
            </div>

            <button type="submit"
                    class="w-full py-4 rounded-2xl bg-red-600 hover:bg-red-500 text-white font-bold shadow-lg active:scale-95 transition-all">
                Actualizar y Acceder
            </button>
        </form>

        <p class="text-center mt-6 text-[10px] text-slate-600 uppercase tracking-widest">
            Usuario: <span class="text-slate-400">{{ session.username }}</span>
        </p>
    </div>
</div>
{% endblock %}
