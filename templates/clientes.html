{% extends "base.html" %}
{% block title %}Clientes{% endblock %}
{% block content %}
<div class="flex justify-between items-center mb-4">
  <h1 class="text-xl font-bold">Clientes</h1>
  <a href="{{ url_for('clientes_nuevo') }}" class="px-3 py-2 rounded-xl bg-accent text-slate-900 text-sm font-bold">+ Nuevo</a>
</div>
<div class="space-y-2">
  {% for c in clientes %}
  <div class="bg-panel rounded-xl border border-slate-700 p-3 flex justify-between items-start gap-2">
    <div>
      <p class="font-semibold text-white">{{ c[1] }}</p>
      <p class="text-xs text-slate-400">{{ c[2] }} · {{ c[3] or '—' }}</p>
    </div>
    <div class="flex flex-col gap-1 shrink-0">
      <a href="{{ url_for('clientes_editar', cid=c[0]) }}" class="text-xs text-accent">Editar</a>
      <form method="post" action="{{ url_for('clientes_eliminar', cid=c[0]) }}" onsubmit="return confirm('¿Eliminar cliente y todo su historial?');">
        <button type="submit" class="text-xs text-rose-400">Eliminar</button>
      </form>
    </div>
  </div>
  {% else %}
  <p class="text-slate-500 text-sm">No hay clientes. Crea uno.</p>
  {% endfor %}
</div>
{% endblock %}
