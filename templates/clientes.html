{% extends "base.html" %}
{% block title %}Clientes{% endblock %}
{% block content %}
<div class="flex justify-between items-center mb-4">
  <h1 class="text-xl font-bold">Clientes</h1>
  <a href="{{ url_for('clientes_nuevo') }}" class="px-3 py-2 rounded-xl bg-accent text-slate-900 text-sm font-bold">+ Nuevo</a>
</div>
<div class="space-y-2">
  {% for c in clientes %}
  <div class="bg-panel rounded-xl border border-slate-700 p-3 flex justify-between items-stretch gap-2">
    <a href="{{ url_for('clientes_editar', cid=c[0]) }}" class="flex-1 min-w-0 block py-0.5 active:opacity-80">
      <p class="font-semibold text-white">{{ c[1] }}</p>
      <p class="text-xs text-slate-400">{{ c[2] }} · {{ c[3] or '—' }}</p>
      <p class="text-[11px] text-slate-500 mt-0.5">Toca para editar</p>
    </a>
    <div class="flex flex-col gap-1 shrink-0 justify-center">
      <form method="post" action="{{ url_for('clientes_eliminar', cid=c[0]) }}" onsubmit="return confirm('¿Eliminar cliente y todo su historial?');">
        <button type="submit" class="text-xs text-rose-400 px-2">Eliminar</button>
      </form>
    </div>
  </div>
  {% else %}
  <p class="text-slate-500 text-sm">No hay clientes. Crea uno.</p>
  {% endfor %}
</div>
{% endblock %}
