{% extends "base.html" %}
{% block title %}Iniciar sesión — Financiera NP{% endblock %}
{% block content %}
<h1 class="text-2xl font-bold text-accent mb-1">Financiera NP</h1>
<p class="text-slate-400 text-sm mb-6">Ingresa con tu usuario y clave.</p>
<form method="post" class="space-y-4 bg-panel rounded-2xl border border-slate-700 p-5">
  <div>
    <label class="block text-sm text-slate-400 mb-1">Usuario</label>
    <input name="username" autocomplete="username" required class="w-full rounded-xl bg-panel2 border border-slate-600 px-3 py-2 text-white focus:ring-2 focus:ring-accent focus:border-accent outline-none">
  </div>
  <div>
    <label class="block text-sm text-slate-400 mb-1">Clave</label>
    <input type="password" name="password" autocomplete="current-password" required class="w-full rounded-xl bg-panel2 border border-slate-600 px-3 py-2 text-white focus:ring-2 focus:ring-accent outline-none">
  </div>
  <button type="submit" class="w-full py-3 rounded-xl bg-accent text-slate-900 font-bold border border-cyan-300">Entrar</button>
</form>
{% endblock %}
